<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIT Transition Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --forest:   #2B4438;
    --forest-lt:#3A5C4C;
    --amber:    #C47B35;
    --amber-lt: #F2E4D0;
    --cream:    #FAF7F3;
    --ink:      #1E1E1E;
    --muted:    #7A7065;
    --border:   #E8E0D6;
    --shadow:   rgba(43, 68, 56, 0.18);
    --radius:   18px;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Sticky launcher button ── */
  .launcher {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .launcher-label {
    background: var(--forest);
    color: white;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 20px;
    white-space: nowrap;
    box-shadow: 0 4px 16px var(--shadow);
    cursor: pointer;
    animation: fadeUp 0.4s ease 0.6s both;
    transition: background 0.18s ease;
  }

  .launcher-label:hover { background: var(--forest-lt); }

  .launcher-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--forest);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 24px var(--shadow);
    transition: transform 0.2s ease, background 0.18s ease;
    position: relative;
    animation: fadeUp 0.4s ease 0.4s both;
  }

  .launcher-btn:hover { background: var(--forest-lt); transform: scale(1.06); }
  .launcher-btn:active { transform: scale(0.96); }

  .launcher-btn svg { width: 26px; height: 26px; fill: white; transition: opacity 0.2s; }
  .launcher-btn .icon-open  { display: block; }
  .launcher-btn .icon-close { display: none; }

  .launcher-btn.open .icon-open  { display: none; }
  .launcher-btn.open .icon-close { display: block; }

  /* Pulse ring on launcher */
  .launcher-btn::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(43,68,56,0.3);
    animation: pulse 2.5s ease-out infinite;
  }

  @keyframes pulse {
    0%   { opacity: 1; transform: scale(1); }
    70%  { opacity: 0; transform: scale(1.4); }
    100% { opacity: 0; }
  }

  /* Unread dot */
  .unread-dot {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 14px;
    height: 14px;
    background: var(--amber);
    border-radius: 50%;
    border: 2px solid white;
    animation: fadeUp 0.3s ease 1.2s both;
  }

  .unread-dot.hidden { display: none; }

  /* ── Chat panel ── */
  .chat-panel {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 380px;
    height: 580px;
    background: var(--cream);
    border-radius: 20px;
    box-shadow: 0 16px 60px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: scale(0.92) translateY(20px);
    transform-origin: bottom right;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
  }

  .chat-panel.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── Header ── */
  .chat-header {
    background: var(--forest);
    padding: 16px 18px 14px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .chat-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 50%, rgba(196,123,53,0.18) 0%, transparent 60%);
    pointer-events: none;
  }

  .header-inner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--amber);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 600;
    color: white;
  }

  .header-text h1 {
    font-family: 'Lora', serif;
    font-size: 14px;
    font-weight: 600;
    color: white;
    line-height: 1.2;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.58);
    margin-top: 2px;
    font-weight: 300;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #6FCF97;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    padding: 8px 18px 0;
    background: var(--forest);
    flex-shrink: 0;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── Messages ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.28s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    margin-top: 2px;
  }

  .msg-avatar.ai-av   { background: var(--forest); color: white; font-family: 'Lora', serif; }
  .msg-avatar.user-av { background: var(--amber); color: white; }

  .bubble {
    max-width: 80%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.6;
    word-break: break-word;
  }

  .bubble.ai {
    background: white;
    color: var(--ink);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(43,68,56,0.08);
  }

  .bubble.user {
    background: var(--forest);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }

  /* ── Typing indicator ── */
  .typing-bubble {
    background: white;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 1px 4px rgba(43,68,56,0.08);
    width: fit-content;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Starter chips ── */
  .starters { display: flex; flex-direction: column; gap: 6px; margin-left: 34px; }

  .starter-chip {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12.5px;
    color: var(--forest);
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    transition: all 0.16s ease;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
  }

  .starter-chip::before { content: '→'; color: var(--amber); flex-shrink: 0; font-size: 12px; margin-top: 1px; }
  .starter-chip:hover { background: var(--amber-lt); border-color: var(--amber); }

  /* ── CTA Card ── */
  .cta-card {
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-lt) 100%);
    border-radius: 14px;
    padding: 18px 16px 16px;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease 0.2s both;
    margin-left: 34px;
  }

  .cta-card::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 90px; height: 90px;
    border-radius: 50%;
    background: rgba(196,123,53,0.15);
    pointer-events: none;
  }

  .cta-badge {
    display: inline-block;
    background: rgba(196,123,53,0.25);
    color: #F2C68A;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    margin-bottom: 8px;
  }

  .cta-title {
    font-family: 'Lora', serif;
    font-size: 15px;
    color: white;
    font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .cta-desc {
    font-size: 12.5px;
    color: rgba(255,255,255,0.68);
    line-height: 1.5;
    margin-bottom: 14px;
    font-weight: 300;
  }

  .cta-btn {
    display: inline-block;
    background: var(--amber);
    color: white;
    padding: 9px 18px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.18s ease, transform 0.15s ease;
  }

  .cta-btn:hover { background: #B56A25; transform: translateY(-1px); }

  /* ── Input ── */
  .input-area {
    padding: 10px 12px 13px;
    background: var(--cream);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 7px 7px 7px 13px;
    box-shadow: 0 1px 3px rgba(43,68,56,0.06);
    transition: border-color 0.18s;
  }

  .input-row:focus-within { border-color: var(--forest); }

  .input-field {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: transparent;
    resize: none;
    line-height: 1.5;
    min-height: 22px;
    max-height: 100px;
    padding: 2px 0;
  }

  .input-field::placeholder { color: var(--muted); }

  .send-btn {
    width: 34px;
    height: 34px;
    background: var(--forest);
    border: none;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s;
  }

  .send-btn:hover:not(:disabled) { background: var(--forest-lt); }
  .send-btn:disabled { opacity: 0.38; cursor: default; }
  .send-btn svg { fill: white; width: 15px; height: 15px; }

  .disclaimer {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .disclaimer a { color: inherit; }

  /* ── Mobile ── */
  @media (max-width: 440px) {
    .chat-panel {
      width: calc(100vw - 20px);
      right: 10px;
      bottom: 90px;
      height: 70vh;
    }

    .launcher { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<!-- Launcher -->
<div class="launcher">
  <div class="launcher-label" id="launcher-label" onclick="toggleChat()">
    Talk to a Transition Coach
  </div>
  <button class="launcher-btn" id="launcher-btn" type="button" onclick="toggleChat()" aria-label="Open KIT Transition Coach">
    <svg class="icon-open" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    <svg class="icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    <span class="unread-dot" id="unread-dot"></span>
  </button>
</div>

<!-- Chat panel -->
<div class="chat-panel" id="chat-panel" role="dialog" aria-label="KIT Transition Coach">

  <div class="chat-header">
    <div class="header-inner">
      <div class="header-avatar">K</div>
      <div class="header-text">
        <h1>KIT Transition Coach</h1>
        <p><span class="status-dot"></span>Dr. Kennedy Musamali's 10-Step Model</p>
      </div>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Your journey</span>
      <span id="step-label">Ready to begin</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="messages-area" id="messages-area"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="input-field"
        class="input-field"
        placeholder="Share what's on your mind…"
        rows="1"
        aria-label="Your message"
      ></textarea>
      <button class="send-btn" id="send-btn" type="button" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="disclaimer">
      <a href="https://www.kennedymusamali.com" target="_blank">kennedymusamali.com</a> · 469-844-8251
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────
let messageCount  = 0;
let conversationHistory = [];
let awaitingReply = false;
let startersRemoved = false;
let chatOpened = false;

// ── DOM ──────────────────────────────────────────────────────
const panel       = document.getElementById('chat-panel');
const launcherBtn = document.getElementById('launcher-btn');
const launcherLbl = document.getElementById('launcher-label');
const unreadDot   = document.getElementById('unread-dot');
const messagesArea= document.getElementById('messages-area');
const inputField  = document.getElementById('input-field');
const sendBtn     = document.getElementById('send-btn');
const progressFill= document.getElementById('progress-fill');
const stepLabel   = document.getElementById('step-label');

// ── Toggle panel ─────────────────────────────────────────────
function toggleChat() {
  const isOpen = panel.classList.contains('open');

  if (isOpen) {
    panel.classList.remove('open');
    launcherBtn.classList.remove('open');
    launcherLbl.style.display = 'flex';
  } else {
    panel.classList.add('open');
    launcherBtn.classList.add('open');
    launcherLbl.style.display = 'none';
    unreadDot.classList.add('hidden');

    if (!chatOpened) {
      chatOpened = true;
      boot();
    } else {
      // re-focus input if chat already started
      setTimeout(() => inputField.focus(), 200);
    }
  }
}

// ── Boot ─────────────────────────────────────────────────────
function boot() {
  const greeting = "Hello, and welcome. I'm your KIT Transition Coach, grounded in the Kennedy Integrated Transition Model developed by Dr. Kennedy Musamali.\n\nThis is a safe, reflective space. We'll move through ten thoughtful questions together — at whatever pace feels right for you. Where would you like to begin?";
  appendAiBubble(greeting);

  const starters = [
    "I'm going through a major life change and don't know where to start.",
    "I want help navigating a big shift using the KIT Model.",
    "I'm feeling overwhelmed and need help making sense of what I'm experiencing."
  ];

  const wrap = document.createElement('div');
  wrap.id = 'starters-row';

  const list = document.createElement('div');
  list.className = 'starters';

  starters.forEach(text => {
    const chip = document.createElement('button');
    chip.className = 'starter-chip';
    chip.textContent = text;
    chip.addEventListener('click', () => handleStarterClick(text));
    list.appendChild(chip);
  });

  wrap.appendChild(list);
  messagesArea.appendChild(wrap);
  scrollBottom();

  setTimeout(() => inputField.focus(), 300);
}

function removeStarters() {
  if (startersRemoved) return;
  const row = document.getElementById('starters-row');
  if (row) row.remove();
  startersRemoved = true;
}

function handleStarterClick(text) {
  inputField.value = text;
  sendMessage();
}

// ── Send ─────────────────────────────────────────────────────
function sendMessage() {
  const text = inputField.value.trim();
  if (!text || awaitingReply) return;

  removeStarters();
  appendUserBubble(text);
  inputField.value = '';
  autoResize();

  messageCount++;
  conversationHistory.push({ role: 'user', content: text });
  updateProgress(messageCount);
  setLoading(true);

  const snap     = [...conversationHistory];
  const stepSnap = messageCount;

  fetch('https://script.google.com/macros/s/AKfycbxZhDoMCg8KXPsEkBeWwLd3qiyuots_nkxVJ1J5Kn1cg2aYvIJWjuyG6ndG4agIE3uE/exec', {
    method: 'POST',
    body: JSON.stringify({ history: snap, step: stepSnap })
  })
    .then(r => r.text())
    .then(reply => onReply(reply))
    .catch(err  => onError(err));
}

// ── Reply ─────────────────────────────────────────────────────
function onReply(raw) {
  setLoading(false);

  const ctaMatch = raw.match(/<!--KITCTA:([\s\S]*?)-->/);
  let displayText = raw;
  let ctaData = null;

  if (ctaMatch) {
    displayText = raw.replace(/<!--KITCTA:[\s\S]*?-->/, '').trim();
    try { ctaData = JSON.parse(ctaMatch[1]); } catch(e) {}
  }

  conversationHistory.push({ role: 'assistant', content: raw });
  appendAiBubble(displayText);
  if (ctaData) appendCtaCard(ctaData);

  if (messageCount >= 10) {
    inputField.disabled = true;
    sendBtn.disabled    = true;
    inputField.placeholder = 'Your journey is complete. See the next step above.';
  }

  scrollBottom();
}

function onError(err) {
  setLoading(false);
  appendAiBubble("Something went wrong on my end. Please try again, or reach Dr. Musamali directly at services@kennedymusamali.com.");
  console.error(err);
}

// ── Bubbles ───────────────────────────────────────────────────
function appendAiBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row';

  const av = document.createElement('div');
  av.className = 'msg-avatar ai-av';
  av.textContent = 'K';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = '<p>' + escapeHtml(text).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>') + '</p>';

  row.appendChild(av);
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  scrollBottom();
}

function appendUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';

  const av = document.createElement('div');
  av.className = 'msg-avatar user-av';
  av.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;

  row.appendChild(av);
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  scrollBottom();
}

function appendCtaCard(cta) {
  const badgeMap = {
    counseling:            'Recommended: Counseling',
    consulting:            'Recommended: Consulting',
    coaching:              'Recommended: Coaching',
    workshop:              'Recommended: Workshop & Training',
    course_college:        'College Transitions Course',
    course_career:         'Career Transitions Course',
    course_crosscultural:  'Cross-Cultural Transitions Course',
    course_organizational: 'Organizational Transitions Course',
    course_life:           'Life Transitions Course',
    course:                'Recommended Course'
  };

  const card = document.createElement('div');
  card.className = 'cta-card';
  card.innerHTML = `
    <div class="cta-badge">${badgeMap[cta.type] || 'Your Next Step'}</div>
    <div class="cta-title">${escapeHtml(cta.title || '')}</div>
    <div class="cta-desc">${escapeHtml(cta.description || '')}</div>
    <a class="cta-btn" href="${escapeHtml(cta.url || 'https://www.kennedymusamali.com')}" target="_blank" rel="noopener">
      ${escapeHtml(cta.label || 'Learn More')}
    </a>
  `;
  messagesArea.appendChild(card);
  scrollBottom();
}

// ── Loading ───────────────────────────────────────────────────
function setLoading(on) {
  awaitingReply = on;
  sendBtn.disabled = on;

  if (on) {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'typing-row';

    const av = document.createElement('div');
    av.className = 'msg-avatar ai-av';
    av.textContent = 'K';

    const dots = document.createElement('div');
    dots.className = 'typing-bubble';
    dots.innerHTML = '<span></span><span></span><span></span>';

    row.appendChild(av);
    row.appendChild(dots);
    messagesArea.appendChild(row);
    scrollBottom();
  } else {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }
}

// ── Progress ──────────────────────────────────────────────────
function updateProgress(step) {
  progressFill.style.width = Math.min((step / 10) * 100, 100) + '%';
  stepLabel.textContent = step < 10 ? 'Step ' + step + ' of 10' : 'Journey complete ✦';
}

// ── Utils ─────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollBottom() {
  requestAnimationFrame(() => { messagesArea.scrollTop = messagesArea.scrollHeight; });
}

function autoResize() {
  inputField.style.height = 'auto';
  inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
}

// ── Events ────────────────────────────────────────────────────
sendBtn.addEventListener('click', sendMessage);

inputField.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

inputField.addEventListener('input', autoResize);
</script>
</body>
</html>
